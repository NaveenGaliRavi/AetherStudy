<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AetherStudy — Premium Study Suite & Spaced Repetition</title>
  <meta name="description" content="AetherStudy is a beautiful, dark-mode, glassmorphic study assistant featuring a Pomodoro timer, hierarchical todo planner, Leitner spaced-repetition flashcards, and automated reminder quizzes.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/style.css">
</head>
<body>
  <!-- App Container -->
  <div class="app-container">
    
    <!-- Sidebar Navigation -->
    <aside class="sidebar" id="sidebar-nav">
      <div class="brand">
        <div class="brand-logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="url(#logo-grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 17L12 22L22 17" stroke="url(#logo-grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 12L12 17L22 12" stroke="url(#logo-grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <defs>
              <linearGradient id="logo-grad" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
                <stop stop-color="#ff007f"/>
                <stop offset="0.5" stop-color="#7f00ff"/>
                <stop offset="1" stop-color="#00f0ff"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <span class="brand-name">AetherStudy</span>
      </div>

      <nav class="nav-menu">
        <button class="nav-item active" data-target="dashboard" id="nav-dashboard">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="9" />
            <rect x="14" y="3" width="7" height="5" />
            <rect x="14" y="12" width="7" height="9" />
            <rect x="3" y="16" width="7" height="5" />
          </svg>
          <span class="nav-label">Dashboard</span>
        </button>

        <button class="nav-item" data-target="planner" id="nav-planner">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
            <line x1="16" y1="13" x2="8" y2="13" />
            <line x1="16" y1="17" x2="8" y2="17" />
            <polyline points="10 9 9 9 8 9" />
          </svg>
          <span class="nav-label">Study Planner</span>
        </button>

        <button class="nav-item" data-target="pomodoro" id="nav-pomodoro">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10" />
            <polyline points="12 6 12 12 16 14" />
          </svg>
          <span class="nav-label">Pomodoro Timer</span>
          <span id="pomo-badge" class="badge hidden">00:00</span>
        </button>

        <button class="nav-item" data-target="flashcards" id="nav-flashcards">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <line x1="3" y1="9" x2="21" y2="9" />
            <line x1="9" y1="21" x2="9" y2="9" />
          </svg>
          <span class="nav-label">Flashcards</span>
          <span id="flashcard-badge" class="badge hidden">0</span>
        </button>

        <button class="nav-item" data-target="quizzes" id="nav-quizzes">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
          </svg>
          <span class="nav-label">Quiz Maker</span>
          <span id="quiz-badge" class="badge warning-badge hidden">!</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <div class="footer-avatar">AS</div>
        <div class="footer-info">
          <span class="user-name">Guest Scholar</span>
          <span class="user-status">Deep Focus Mode</span>
        </div>
      </div>
    </aside>

    <!-- Main Content Stage -->
    <main class="main-stage">
      <header class="stage-header">
        <div class="header-left">
          <h1 id="view-title">Dashboard</h1>
          <p id="view-subtitle" class="text-secondary">Welcome back to AetherStudy. Let's make progress today.</p>
        </div>
        <div class="header-right">
          <div class="system-time" id="system-time">00:00:00</div>
        </div>
      </header>

      <!-- Panel Views -->
      <section class="view-panel active" id="view-dashboard"></section>
      <section class="view-panel" id="view-planner"></section>
      <section class="view-panel" id="view-pomodoro"></section>
      <section class="view-panel" id="view-flashcards"></section>
      <section class="view-panel" id="view-quizzes"></section>
    </main>

  </div>

  <!-- Audio Synthesis Container (Web Audio API) -->
  <div id="audio-container" style="display: none;"></div>

  <!-- Custom Alert/Reminder Overlay Modal -->
  <div id="reminder-modal" class="modal-overlay hidden">
    <div class="modal-content glass-card">
      <div class="modal-header">
        <div class="modal-icon alert-icon">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
            <line x1="12" y1="9" x2="12" y2="13" />
            <line x1="12" y1="17" x2="12.01" y2="17" />
          </svg>
        </div>
        <h3 id="reminder-title">Time for a Quiz!</h3>
      </div>
      <div class="modal-body">
        <p id="reminder-message">Your scheduled reminder for "Physics Basics" is ready. Take the quiz now to reinforce your learning!</p>
      </div>
      <div class="modal-actions">
        <button id="btn-reminder-skip" class="btn btn-secondary">Snooze</button>
        <button id="btn-reminder-start" class="btn btn-primary">Take Quiz</button>
      </div>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
